<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2400" role="img" aria-labelledby="title desc">
  <title id="title">Comic intro page 1 placeholder</title>
  <desc id="desc">A full-page placeholder for the first GPT 5.5 comic intro page.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1a2118"/>
      <stop offset="0.5" stop-color="#0d1211"/>
      <stop offset="1" stop-color="#21170d"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="2400" fill="url(#bg)"/>
  <rect x="76" y="76" width="1448" height="2248" rx="38" fill="none" stroke="#caa86d" stroke-width="8"/>
  <rect x="128" y="132" width="1344" height="1660" rx="28" fill="#111820" stroke="#80633d" stroke-width="5"/>
