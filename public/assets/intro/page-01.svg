  <text x="800" y="2018" fill="#caa86d" font-family="system-ui, Segoe UI, sans-serif" font-size="44" font-weight="700" text-anchor="middle">Drop final page-01 art here</text>
  <text x="800" y="2094" fill="#9f9173" font-family="system-ui, Segoe UI, sans-serif" font-size="34" text-anchor="middle">Use page-01.png, page-01.webp, page-01.jpg, or this SVG fallback.</text>
