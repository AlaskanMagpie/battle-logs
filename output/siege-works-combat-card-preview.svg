<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600" role="img" aria-labelledby="title desc">
  <title id="title">Siege Works combat-aware doctrine card preview</title>
  <desc id="desc">A full-size doctrine structure card showing current catalog, production, and combat-profile values.</desc>
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16151a"/>
      <stop offset=".52" stop-color="#0b0c10"/>
      <stop offset="1" stop-color="#050609"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2=".9" y2="1">
      <stop offset="0" stop-color="#74411f"/>
      <stop offset=".62" stop-color="#241817"/>
      <stop offset="1" stop-color="#0a0808"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffbd62"/>
      <stop offset="1" stop-color="#e04b25"/>
    </linearGradient>
    <linearGradient id="combat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#21150f"/>
      <stop offset="1" stop-color="#0b1118"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="13" stdDeviation="15" flood-color="#000" flood-opacity=".62"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="600" fill="#030306"/>
  <rect x="2" y="2" width="396" height="596" rx="14" fill="url(#shell)" stroke="#e8792d" stroke-width="4" filter="url(#shadow)"/>
  <rect x="7" y="7" width="386" height="586" rx="10" fill="none" stroke="#fff" stroke-opacity=".065"/>
  <rect x="10" y="10" width="380" height="580" rx="8" fill="none" stroke="#000" stroke-opacity=".8"/>

  <g>
    <clipPath id="heroClip"><rect x="10" y="10" width="380" height="202" rx="9"/></clipPath>
    <g clip-path="url(#heroClip)">
      <rect x="10" y="10" width="380" height="202" fill="url(#hero)"/>
      <circle cx="318" cy="34" r="92" fill="#ff8c35" opacity=".12"/>
      <circle cx="87" cy="70" r="64" fill="#fff" opacity=".045"/>
      <path d="M26 172 C90 144 132 194 206 162 S324 138 390 164 L390 212 L26 212 Z" fill="#030406" opacity=".46"/>

      <g transform="translate(65 36)" filter="url(#glow)">
        <ellipse cx="135" cy="126" rx="106" ry="18" fill="#000" opacity=".36"/>
        <rect x="67" y="72" width="136" height="48" rx="5" fill="#0a0a0b" opacity=".64"/>
        <rect x="77" y="67" width="116" height="42" rx="4" fill="#392119"/>
        <rect x="91" y="43" width="74" height="28" rx="4" fill="#5a321e"/>
        <rect x="104" y="28" width="48" height="18" rx="2" fill="#7b4525"/>
        <path d="M26 112 L88 83 L99 98 L42 132 Z" fill="#241917"/>
        <path d="M245 112 L183 83 L172 98 L229 132 Z" fill="#241917"/>
        <circle cx="58" cy="125" r="14" fill="#15181e" stroke="#9b5b2c" stroke-width="5"/>
        <circle cx="213" cy="125" r="14" fill="#15181e" stroke="#9b5b2c" stroke-width="5"/>
        <path d="M135 20 L151 62 L119 62 Z" fill="url(#hot)" opacity=".9"/>
        <path d="M42 54 L80 44 L82 60 L44 72 Z" fill="#c47a34" opacity=".78"/>
        <path d="M228 54 L190 44 L188 60 L226 72 Z" fill="#c47a34" opacity=".78"/>
        <rect x="126" y="72" width="18" height="54" rx="3" fill="#101114"/>
        <rect x="130" y="80" width="10" height="31" rx="2" fill="#e8792d" opacity=".64"/>
      </g>
      <rect x="10" y="10" width="380" height="202" fill="#000" opacity=".22"/>
      <rect x="10" y="135" width="380" height="77" fill="#000" opacity=".46"/>
    </g>

    <circle cx="39" cy="39" r="26" fill="#111015" stroke="#ffb66a" stroke-opacity=".72" stroke-width="2"/>
    <text x="39" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="#fff4cd">190</text>

    <g transform="translate(244 20)" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="800">
      <rect x="0" y="0" width="78" height="25" rx="13" fill="#080b10" opacity=".88"/>
      <circle cx="13" cy="13" r="4" fill="#e8792d"/>
      <text x="25" y="17" fill="#ffd8b8">Heavy</text>
      <rect x="86" y="0" width="50" height="25" rx="13" fill="#080b10" opacity=".88"/>
      <circle cx="99" cy="13" r="4" fill="#268fff"/>
      <text x="111" y="17" fill="#dcefff">14s</text>
    </g>

    <text x="22" y="174" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#fff">SIEGE WORKS</text>
    <text x="23" y="196" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="800" letter-spacing="2.5" fill="#abb3c4">
      <tspan fill="#f0c338">DOCTRINE</tspan><tspan opacity=".55"> / </tspan><tspan fill="#e5e9f2">STRUCTURE</tspan>
    </text>
  </g>

  <g transform="translate(10 212)" font-family="Arial, Helvetica, sans-serif">
    <rect width="380" height="61" fill="#070b12" opacity=".96"/>
    <line x1="0" y1="61" x2="380" y2="61" stroke="#fff" stroke-opacity=".075"/>
    <g text-anchor="middle">
      <text x="47.5" y="27" font-size="22" font-weight="900" fill="#ff404d">430</text>
      <text x="47.5" y="46" font-size="9" font-weight="800" letter-spacing="1.3" fill="#7a859a">HP</text>
      <line x1="95" y1="12" x2="95" y2="49" stroke="#fff" stroke-opacity=".1"/>
      <text x="142.5" y="27" font-size="22" font-weight="900" fill="#268fff">18s</text>
      <text x="142.5" y="46" font-size="9" font-weight="800" letter-spacing="1.3" fill="#7a859a">BUILD</text>
      <line x1="190" y1="12" x2="190" y2="49" stroke="#fff" stroke-opacity=".1"/>
      <text x="237.5" y="27" font-size="22" font-weight="900" fill="#ffb000">34s</text>
      <text x="237.5" y="46" font-size="9" font-weight="800" letter-spacing="1.3" fill="#7a859a">PROD</text>
      <line x1="285" y1="12" x2="285" y2="49" stroke="#fff" stroke-opacity=".1"/>
      <text x="332.5" y="27" font-size="22" font-weight="900" fill="#a676ff">2x/12</text>
      <text x="332.5" y="46" font-size="9" font-weight="800" letter-spacing="1.3" fill="#7a859a">POP / CAP</text>
    </g>
  </g>

  <g transform="translate(22 288)" font-family="Arial, Helvetica, sans-serif">
    <g>
      <rect width="356" height="38" rx="6" fill="#352758" fill-opacity=".58" stroke="#8b55f0" stroke-opacity=".72"/>
      <text x="16" y="25" font-size="13" font-weight="900" fill="#a879ff">Unit</text>
      <text x="64" y="25" font-size="14" font-weight="900" fill="#eadfff">Heavy rams</text>
      <g transform="translate(239 9)" font-size="9" font-weight="900" letter-spacing="1.1">
        <rect width="46" height="18" rx="3" fill="#584783" opacity=".74"/>
        <text x="23" y="12.5" text-anchor="middle" fill="#d3c8ff">SLOW</text>
        <g transform="translate(52 0)">
          <rect width="54" height="18" rx="3" fill="#584783" opacity=".74"/>
          <text x="27" y="12.5" text-anchor="middle" fill="#d3c8ff">SIEGE</text>
        </g>
      </g>
    </g>

    <g transform="translate(0 50)">
      <rect width="356" height="130" rx="8" fill="url(#combat)" stroke="#e8792d" stroke-opacity=".5"/>
      <circle cx="318" cy="18" r="56" fill="#e8792d" opacity=".09"/>
      <text x="14" y="25" font-size="10" font-weight="900" letter-spacing="1.6" fill="#eef4ff">COMBAT PROFILE</text>
      <text x="342" y="25" text-anchor="end" font-size="10" font-weight="800" fill="#f3b27a">Heavy unit</text>
      <g transform="translate(12 39)" text-anchor="middle">
        <rect width="78" height="38" rx="5" fill="#000" opacity=".28" stroke="#fff" stroke-opacity=".07"/>
        <text x="39" y="18" font-size="16" font-weight="900" fill="#ff5965">160</text>
        <text x="39" y="31" font-size="8" font-weight="800" letter-spacing="1" fill="#929eb5">UNIT HP</text>
        <g transform="translate(88 0)">
          <rect width="78" height="38" rx="5" fill="#000" opacity=".28" stroke="#fff" stroke-opacity=".07"/>
          <text x="39" y="18" font-size="16" font-weight="900" fill="#72c6ff">15u</text>
          <text x="39" y="31" font-size="8" font-weight="800" letter-spacing="1" fill="#929eb5">RANGE</text>
        </g>
        <g transform="translate(176 0)">
          <rect width="78" height="38" rx="5" fill="#000" opacity=".28" stroke="#fff" stroke-opacity=".07"/>
          <text x="39" y="18" font-size="16" font-weight="900" fill="#7ce0a4">4u/s</text>
          <text x="39" y="31" font-size="8" font-weight="800" letter-spacing="1" fill="#929eb5">SPEED</text>
        </g>
        <g transform="translate(264 0)">
          <rect width="68" height="38" rx="5" fill="#000" opacity=".28" stroke="#fff" stroke-opacity=".07"/>
          <text x="34" y="18" font-size="16" font-weight="900" fill="#ffc34d">11</text>
          <text x="34" y="31" font-size="8" font-weight="800" letter-spacing="1" fill="#929eb5">DPS</text>
        </g>
      </g>
      <g transform="translate(12 91)" font-size="9" font-weight="850" fill="#dae3f4">
        <rect width="102" height="20" rx="4" fill="#fff" opacity=".06"/>
        <text x="9" y="13">Anti-Line +50%</text>
        <g transform="translate(110 0)">
          <rect width="112" height="20" rx="4" fill="#fff" opacity=".06"/>
          <text x="9" y="13">Trample 2x vs Swarm</text>
        </g>
        <g transform="translate(230 0)">
          <rect width="102" height="20" rx="4" fill="#fff" opacity=".06"/>
          <text x="9" y="13">0.75x structures</text>
        </g>
        <g transform="translate(0 25)">
          <rect width="136" height="20" rx="4" fill="#fff" opacity=".06"/>
          <text x="9" y="13">0.63x Mana anchors</text>
        </g>
      </g>
    </g>

    <g transform="translate(0 191)">
      <rect width="356" height="48" rx="6" fill="#3a121a" fill-opacity=".58" stroke="#e62c32" stroke-opacity=".72"/>
      <circle cx="23" cy="24" r="13" fill="#d21f32"/>
      <text x="23" y="29" text-anchor="middle" font-size="13" font-weight="900" fill="#fff">X</text>
      <text x="47" y="20" font-size="13" font-weight="900" fill="#ff4b55">Siege Breaker</text>
      <text x="47" y="35" font-size="10" font-weight="700" fill="#cdd4e1">Produced units deal +50% vs enemy structures before objective scaling.</text>
    </g>

    <g transform="translate(0 250)">
      <rect width="356" height="42" rx="6" fill="#120d0b" stroke="#fff" stroke-opacity=".08"/>
      <rect x="13" y="10" width="3" height="22" rx="2" fill="#b98225"/>
      <text x="29" y="18" font-size="11" font-style="italic" fill="#aab6cd">Heavy rams: slow single-model siege units built to crack fortified lines.</text>
      <text x="29" y="32" font-size="10" fill="#7f8a9d">Card reads current combat class stats, trample, anti-class, and objective damage.</text>
    </g>
  </g>

  <text x="200" y="581" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" letter-spacing=".8" fill="#fff" opacity=".23">siege_works</text>
</svg>
